name: ExpressApp

services:
  mongodb:
    # restart: always
    image: mongo:latest
    container_name: mongodb-express
    volumes:
      - mongo_data::/data/db
    ports:
      - 27017:27017
  # Redis Server
  redis-server:
    # restart: always
    image: redis:8.0
    container_name: redis-server
    hostname: redis-server
    ports:
      - "6379:6379"

volumes:
  mongo_data
